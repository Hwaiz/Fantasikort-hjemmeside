<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <title>Fri Fantasi - Kontakt</title>
    <meta name="description" content="Fri Fantasi kontaktside">
    <meta name="keywords" content="Kontakt, Fri Fantasi, Fantasikort, udviklende legetøj, Fantasileg, Spil til børn">
    
    <meta property="og:title" content="Fri Fantasi - Kontakt">
    <meta property="og:description" content="Fri Fantasi kontaktside">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.fri-fantasi.dk/kontakt">
    <meta property="og:image" content="https://www.fri-fantasi.dk/assets/Fri-fantasi-hero.jpg">
    
    <link rel="canonical" href="https://www.fri-fantasi.dk/kontakt">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sun: #eb9b9b;
            --sky: #74C0FC;
            --coral: #FF6B6B;
            --mint: #FFD43B;
            --shadow: rgba(26,44,82,0.12);

            --ligthBlue: #a1b7f0;
            --middleBlue: #8da6e7;
            --Darkblue: #2c4583;
            --ligthComplement: #FFD43B;

            --topBar: #a1b7f0;
            --background: #fffff0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--background);
            color: var(--Darkblue);
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: var(--topBar);
            padding: 0 2rem;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
        }

        .nav-logo {
            position: absolute;
            left: 2rem;
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            color: var(--Darkblue);
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            background: none;
            border: 2px solid transparent;
            color: var(--Darkblue);
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 0.45rem 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--middleBlue);
            color: var(--Darkblue);
            border-color: var(--Darkblue);
            transform: translateY(-2px);
        }

        /* ── PAGES ── */
        .page { display: block; animation: fadeIn 0.35s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }




        .contact-line {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.9rem 0;
            border-bottom: 1px solid #e8eff8;
            font-size: 1rem;
            color: var(--Darkblue);
            font-weight: 600;
        }

        .contact-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--ligthBlue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .contact-label {
            font-size: 0.8rem;
            color: #8a9ab8;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .contact-value { font-size: 1rem; font-weight: 700; color: var(--Darkblue); }

        .contact-inner {
            max-width: 720px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .contact-inner h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.8rem;
            color: var(--Darkblue);
            margin-bottom: 0.4rem;
        }

        .contact-inner p {
            font-size: 1.05rem;
            color: #4a5a78;
            line-height: 1.8;
            margin-bottom: 1.2rem;
        }

        @media (max-width: 700px) {
            .nav-logo {
                font-size: 1.5rem;
            }

            .nav-buttons {
                gap: 0.4rem;
            }
            
            .nav-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.95rem;
                text-decoration: none;
            }
        }

        @media (max-width: 630px) {
            nav {
                height: auto;
                flex-direction: column;
                align-items: center;
                gap: 0.6rem;
                padding: 1.4rem 1rem 1rem;
            }

            .nav-logo {
                left: 50%;
                top: 0.5rem;
                transform: translateX(-50%);
                font-size: 1.35rem;
            }

            .nav-buttons {
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.4rem;
                transform: translateY(35%);
            }

            .nav-btn {
                padding: 0.35rem 1rem;
                font-size: 0.95rem;
                text-decoration: none;
            }
        }

    </style>
</head>
<body>
    <nav>
        <a class="nav-logo" href="/">Fri Fantasi</a>
        <div class="nav-buttons">
            <a href="/" class="nav-btn" id="btn-home">Startside</a>
            <a href="/om-os" class="nav-btn" id="btn-about">Om os</a>
            <a href="/kontakt" class="nav-btn active" id="btn-contact">Kontakt</a>
        </div>
    </nav>

    <div class="page" id="page-contact">
    <div class="contact-inner">
      <h1>Kontakt</h1>

      <p>
        Skriv gerne til os, hvis du har spørgsmål, har brug for hjælp eller noget helt tredje.
      </p>

      <div class="contact-line">
        <div class="contact-icon">📧</div>
        <div>
          <div class="contact-label">Email</div>
          <div class="contact-value">hwaiz@proton.me</div>
        </div>
      </div>

      <div class="contact-line">
        <div class="contact-icon">📞</div>
        <div>
          <div class="contact-label">Telefon</div>
          <div class="contact-value">+45 93 88 42 88</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
